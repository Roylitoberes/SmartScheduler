name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore MyFirstMauiApp/SmartScheduler.csproj

    # ✅ FIXED: Save keystore inside project folder
    - name: Decode Keystore
      shell: pwsh
      run: |
        $bytes = [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}")
        [IO.File]::WriteAllBytes("MyFirstMauiApp/keystore.keystore", $bytes)

    # ✅ FIXED: Use correct project path + keystore path
    - name: Build APK (Signed)
      run: |
        dotnet publish MyFirstMauiApp/SmartScheduler.csproj -f net10.0-android -c Release `
          -p:AndroidPackageFormat=apk `
          -p:AndroidKeyStore=true `
          -p:AndroidSigningKeyStore=MyFirstMauiApp/keystore.keystore `
          -p:AndroidSigningKeyAlias=${{ secrets.ANDROID_KEY_ALIAS }} `
          -p:AndroidSigningKeyPass=${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }} `
          -p:AndroidSigningStorePass=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

    # ✅ Better APK path
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartScheduler-APK
        path: MyFirstMauiApp/bin/Release/net10.0-android/*.apk
