name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Install MAUI workload
      run: dotnet workload install maui

    - name: Restore dependencies
      run: dotnet restore

    - name: Decode Keystore
      shell: pwsh
      run: |
        $bytes = [Convert]::FromBase64String("${{ secrets.KEYSTORE_BASE64 }}")
        [IO.File]::WriteAllBytes("keystore.keystore", $bytes)

    - name: Build APK (Signed)
      run: |
        dotnet publish -f net10.0-android -c Release `
          -p:AndroidPackageFormat=apk `
          -p:AndroidKeyStore=true `
          -p:AndroidSigningKeyStore=keystore.keystore `
          -p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }} `
          -p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }} `
          -p:AndroidSigningStorePass=${{ secrets.KEYSTORE_PASSWORD }}

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartScheduler-APK
        path: "**/*.apk"
